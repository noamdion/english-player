<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Player Lite</title>
    <style>
        :root {
            --bg: #11111b;
            --panel: #13131f;
            --text: #cdd6f4;
            --accent: #4fc3f7;
            --dim: #888;
            --disabled: #3a3a4a;
            --cur-bg: #1b3a4a;
            --btn: #555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }
        .file-area {
            padding: 10px 16px; text-align: center;
            background: var(--panel);
        }
        .file-area button {
            background: #1e5a7a; color: #fff;
            border: none; border-radius: 6px;
            padding: 10px 20px; font-size: 1em; cursor: pointer;
        }
        .file-area span {
            display: block; margin-top: 6px;
            color: var(--dim); font-size: 0.8em;
        }
        .subtitle-list {
            flex: 1; overflow-y: auto; padding: 8px 0;
        }
        .sub-row {
            display: flex; align-items: flex-start;
            padding: 10px 16px; cursor: pointer;
            border-bottom: 1px solid #1a1a2a;
        }
        .sub-row.current {
            background: var(--cur-bg);
        }
        .sub-row .check {
            font-size: 1.1em; margin-right: 10px;
            flex-shrink: 0; width: 24px; text-align: center;
        }
        .sub-row .idx {
            color: var(--dim); font-size: 0.75em;
            margin-right: 8px; flex-shrink: 0; width: 24px;
            text-align: right;
        }
        .sub-row .text {
            flex: 1; line-height: 1.5;
        }
        .notes-panel {
            background: var(--panel);
            border-top: 2px solid #252535;
            padding: 12px 16px;
            max-height: 40vh; overflow-y: auto;
            display: none;
        }
        .notes-panel.open { display: block; }
        .notes-panel .close-btn {
            text-align: right; margin-bottom: 6px;
        }
        .notes-panel .close-btn span {
            color: var(--dim); cursor: pointer; font-size: 0.9em;
        }
        .note-original {
            font-size: 1.1em; font-weight: bold;
            color: var(--text); margin-bottom: 10px;
            line-height: 1.5;
        }
        .note-section { margin-bottom: 8px; }
        .note-label {
            color: var(--dim); font-size: 0.7em;
            text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; padding: 3px 0;
        }
        .note-content { font-size: 0.9em; line-height: 1.5; }
        .note-content.hidden { display: none; }
        .separator { border: none; border-top: 1px solid #252535; margin: 6px 0; }
        .controls {
            background: #0d0d17; padding: 10px 16px;
            display: flex; align-items: center; gap: 8px;
            border-top: 1px solid #222;
        }
        button {
            background: transparent; border: none; color: var(--btn);
            font-size: 1.2em; padding: 6px 10px; cursor: pointer;
        }
        button:active { color: #fff; }
        select {
            background: #1e1e2e; color: #999; border: 1px solid #333;
            border-radius: 4px; padding: 4px 8px; font-size: 0.8em;
        }
        .progress-bar {
            flex: 1; height: 4px; background: #252535;
            border-radius: 2px; position: relative;
        }
        .progress-fill {
            height: 100%; background: var(--accent);
            border-radius: 2px; width: 0%;
        }
    </style>
</head>
<body>

<div class="file-area" id="fileArea">
    <button id="btnLoadAll">📁 选择文件（可多选：MP3 + SRT + JSON）</button>
    <span id="statusText">请同时选中音频、SRT字幕、笔记JSON三个文件</span>
</div>

<div class="subtitle-list" id="subtitleList"></div>

<div class="notes-panel" id="notesPanel">
    <div class="close-btn"><span onclick="closeNotes()">✕ 关闭</span></div>
    <div id="notesContent"></div>
</div>

<div class="controls">
    <button id="btnPrev">«</button>
    <button id="btnPlay">▶</button>
    <button id="btnNext">»</button>
    <select id="selSpeed">
        <option value="0.5">0.5x</option>
        <option value="0.75">0.75x</option>
        <option value="1" selected>1x</option>
        <option value="1.25">1.25x</option>
        <option value="1.5">1.5x</option>
        <option value="2">2x</option>
    </select>
    <select id="selLoop">
        <option value="none">单次</option>
        <option value="sentence">单句循环</option>
        <option value="track">单曲循环</option>
    </select>
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
</div>

<audio id="audio" style="display:none"></audio>

<script>
let subs = [];
let enabled = {};
let currentIdx = -1;
let isPlaying = false;
let loopMode = 'none';

const audio = document.getElementById('audio');
const subtitleList = document.getElementById('subtitleList');
const notesPanel = document.getElementById('notesPanel');
const notesContent = document.getElementById('notesContent');
const btnPlay = document.getElementById('btnPlay');
const progressFill = document.getElementById('progressFill');
const selSpeed = document.getElementById('selSpeed');
const selLoop = document.getElementById('selLoop');
const statusText = document.getElementById('statusText');

// ═══════════════ 解析 SRT ═══════════════
function parseSRT(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    let i = 0;
    while (i < lines.length) {
        while (i < lines.length && lines[i].trim() === '') i++;
        if (i >= lines.length) break;
        i++;
        if (i >= lines.length) break;
        const timeLine = lines[i].trim();
        i++;
        const timeMatch = timeLine.match(/(\d+):(\d+):(\d+)[.,](\d+)\s*-->\s*(\d+):(\d+):(\d+)[.,](\d+)/);
        if (!timeMatch) continue;
        const start = parseInt(timeMatch[1])*3600 + parseInt(timeMatch[2])*60 + parseInt(timeMatch[3]) + parseInt(timeMatch[4])/1000;
        const end   = parseInt(timeMatch[5])*3600 + parseInt(timeMatch[6])*60 + parseInt(timeMatch[7]) + parseInt(timeMatch[8])/1000;
        let text = '';
        while (i < lines.length && lines[i].trim() !== '') {
            text += (text ? ' ' : '') + lines[i].trim();
            i++;
        }
        result.push({start, end, original: text, b1: '', cn: '', ai_notes: '', remarks: ''});
    }
    return result;
}

// ═══════════════ 一键加载：多选文件 ═══════════════
document.getElementById('btnLoadAll').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.multiple = true;
    input.accept = 'audio/*,.srt,.json';
    input.onchange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;

        let audioFile = null;
        let srtText = null;
        let jsonText = null;
        let loaded = 0;

        statusText.textContent = '正在加载...';

        for (const file of files) {
            const ext = file.name.split('.').pop().toLowerCase();
            if (ext === 'mp3' || ext === 'wav' || ext === 'flac' || ext === 'm4a') {
                audioFile = file;
                loaded++;
            } else if (ext === 'srt') {
                const reader = new FileReader();
                reader.onload = (ev) => { srtText = ev.target.result; loaded++; checkAllLoaded(); };
                reader.readAsText(file);
            } else if (ext === 'json') {
                const reader = new FileReader();
                reader.onload = (ev) => { jsonText = ev.target.result; loaded++; checkAllLoaded(); };
                reader.readAsText(file);
            }
        }

        // 如果是异步加载的，稍等一下再检查
        setTimeout(() => {
            if (audioFile) {
                audio.src = URL.createObjectURL(audioFile);
            }
            checkAllLoaded();
        }, 300);

        function checkAllLoaded() {
            if (audioFile && srtText && jsonText) {
                loadAll(srtText, jsonText);
                statusText.textContent = `已加载: ${audioFile.name} ✅`;
            }
        }
    };
    input.click();
});

function loadAll(srtText, jsonText) {
    subs = parseSRT(srtText);
    let notesMap = {};
    try { notesMap = JSON.parse(jsonText); } catch(e) { alert('JSON 解析失败'); return; }
    const keys = Object.keys(notesMap);
    keys.forEach((key) => {
        const idx = parseInt(key);
        if (idx >= 0 && idx < subs.length) {
            const note = notesMap[key];
            subs[idx].b1       = note.b1 || '';
            subs[idx].cn       = note.cn || '';
            subs[idx].ai_notes = note.ai_notes || note.note || '';
            subs[idx].remarks  = note.remarks || note.remark || '';
        }
    });
    const saved = localStorage.getItem('english_player_enabled');
    if (saved) { try { enabled = JSON.parse(saved); } catch(e) { enabled = {}; } }
    else { enabled = {}; }
    subs.forEach((_, i) => { if (enabled[i] === undefined) enabled[i] = true; });
    currentIdx = 0;
    renderSubtitleList();
}

function renderSubtitleList() {
    subtitleList.innerHTML = '';
    subs.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'sub-row' + (i === currentIdx ? ' current' : '');
        const chk = document.createElement('span');
        chk.className = 'check';
        chk.textContent = enabled[i] ? '✓' : '○';
        chk.style.color = enabled[i] ? 'var(--accent)' : 'var(--dim)';
        chk.addEventListener('click', (e) => {
            e.stopPropagation();
            enabled[i] = !enabled[i];
            saveEnabled();
            renderSubtitleList();
        });
        const idxSpan = document.createElement('span');
        idxSpan.className = 'idx';
        idxSpan.textContent = i + 1;
        const textSpan = document.createElement('span');
        textSpan.className = 'text';
        textSpan.textContent = s.original;
        row.appendChild(chk);
        row.appendChild(idxSpan);
        row.appendChild(textSpan);
        row.addEventListener('click', () => { playIdx(i); });
        subtitleList.appendChild(row);
    });
    if (currentIdx >= 0) {
        const rows = subtitleList.querySelectorAll('.sub-row');
        if (rows[currentIdx]) {
            rows[currentIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
    }
}

function saveEnabled() {
    localStorage.setItem('english_player_enabled', JSON.stringify(enabled));
}

function openNotes(idx) {
    const s = subs[idx];
    notesContent.innerHTML = `
        <div class="note-original">${s.original}</div>
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">B1 改写 ▾</div>
            <div class="note-content">${s.b1 || '(无)'}</div>
        </div>
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">中文翻译 ▾</div>
            <div class="note-content">${s.cn || '(无)'}</div>
        </div>
        <hr class="separator">
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">AI 解析 ▾</div>
            <div class="note-content">${s.ai_notes || '(无)'}</div>
        </div>
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">AI 中文 ▾</div>
            <div class="note-content">${s.remarks || '(无)'}</div>
        </div>
    `;
    notesPanel.classList.add('open');
}

function closeNotes() { notesPanel.classList.remove('open'); }
function toggleNote(label) {
    const content = label.nextElementSibling;
    content.classList.toggle('hidden');
    label.textContent = label.textContent.replace('▾', content.classList.contains('hidden') ? '▸' : '▾');
}

function playIdx(idx) {
    if (subs.length === 0) return;
    if (!audio.src || audio.src === window.location.href) { alert('请先选择音频文件'); return; }
    if (idx < 0 || idx >= subs.length) return;
    if (!enabled[idx]) {
        const next = findNextEnabled(idx);
        if (next >= 0) { playIdx(next); return; }
        else { audio.pause(); isPlaying = false; btnPlay.textContent = '▶'; return; }
    }
    audio.currentTime = subs[idx].start;
    audio.play();
    isPlaying = true;
    btnPlay.textContent = '⏸';
    currentIdx = idx;
    renderSubtitleList();
    openNotes(idx);
}

function findNextEnabled(from) {
    for (let i = from + 1; i < subs.length; i++) { if (enabled[i]) return i; }
    return -1;
}

btnPlay.addEventListener('click', () => {
    if (isPlaying) { audio.pause(); isPlaying = false; btnPlay.textContent = '▶'; }
    else { if (currentIdx < 0) playIdx(0); else { audio.play(); isPlaying = true; btnPlay.textContent = '⏸'; } }
});

document.getElementById('btnPrev').addEventListener('click', () => { playIdx(Math.max(0, currentIdx - 1)); });
document.getElementById('btnNext').addEventListener('click', () => { playIdx(Math.min(subs.length - 1, currentIdx + 1)); });

selSpeed.addEventListener('change', () => { audio.playbackRate = parseFloat(selSpeed.value); });
selLoop.addEventListener('change', () => { loopMode = selLoop.value; });

audio.addEventListener('timeupdate', () => {
    const t = audio.currentTime;
    if (audio.duration) { progressFill.style.width = (t / audio.duration * 100) + '%'; }
    let found = -1;
    for (let i = 0; i < subs.length; i++) { if (t >= subs[i].start && t < subs[i].end) { found = i; break; } }
    if (found >= 0 && found !== currentIdx) {
        if (!enabled[found]) { const next = findNextEnabled(found); if (next >= 0) { audio.currentTime = subs[next].start; currentIdx = next; } }
        else { currentIdx = found; }
        renderSubtitleList();
        openNotes(currentIdx);
    }
    if (loopMode === 'sentence' && currentIdx >= 0) { if (t >= subs[currentIdx].end - 0.1) { audio.currentTime = subs[currentIdx].start; } }
});

audio.addEventListener('ended', () => {
    if (loopMode === 'track') { audio.currentTime = 0; audio.play(); }
    else { isPlaying = false; btnPlay.textContent = '▶'; }
});

currentIdx = 0;
renderSubtitleList();
</script>
</body>
</html>
