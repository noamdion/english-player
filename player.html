<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Player Lite</title>
    <style>
        :root {
            --bg: #11111b; --panel: #13131f; --text: #cdd6f4;
            --accent: #4fc3f7; --dim: #888; --disabled: #3a3a4a;
            --cur-bg: #1b3a4a; --btn: #555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }
        /* ── 课程列表页 ── */
        .course-list {
            flex: 1; overflow-y: auto; padding: 20px 16px;
        }
        .course-list h2 {
            font-size: 1.2em; margin-bottom: 16px;
            color: var(--accent);
        }
        .course-card {
            background: var(--panel);
            border: 1px solid #252535;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .course-card:active { background: #1e1e30; }
        .course-card .course-name {
            font-size: 1em; font-weight: bold;
        }
        .course-card .course-folder {
            font-size: 0.75em; color: var(--dim); margin-top: 4px;
        }
        /* ── 播放器页 ── */
        .player-page { display: none; flex-direction: column; flex: 1; }
        .player-page.active { display: flex; }
        .back-bar {
            padding: 10px 16px; background: var(--panel);
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #222;
        }
        .back-bar button {
            background: transparent; border: none; color: var(--accent);
            font-size: 1em; cursor: pointer;
        }
        .back-bar span {
            font-size: 0.95em; color: var(--text);
        }
        .subtitle-list {
            flex: 1; overflow-y: auto; padding: 8px 0;
        }
        .sub-row {
            display: flex; align-items: flex-start;
            padding: 10px 16px; cursor: pointer;
            border-bottom: 1px solid #1a1a2a;
        }
        .sub-row.current { background: var(--cur-bg); }
        .sub-row .check {
            font-size: 1.1em; margin-right: 10px;
            flex-shrink: 0; width: 24px; text-align: center;
        }
        .sub-row .idx {
            color: var(--dim); font-size: 0.75em;
            margin-right: 8px; flex-shrink: 0; width: 24px; text-align: right;
        }
        .sub-row .text { flex: 1; line-height: 1.5; }
        .notes-panel {
            background: var(--panel);
            border-top: 2px solid #252535;
            padding: 12px 16px;
            max-height: 40vh; overflow-y: auto;
            display: none;
        }
        .notes-panel.open { display: block; }
        .notes-panel .close-btn { text-align: right; margin-bottom: 6px; }
        .notes-panel .close-btn span { color: var(--dim); cursor: pointer; font-size: 0.9em; }
        .note-original {
            font-size: 1.1em; font-weight: bold;
            color: var(--text); margin-bottom: 10px; line-height: 1.5;
        }
        .note-section { margin-bottom: 8px; }
        .note-label {
            color: var(--dim); font-size: 0.7em;
            text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; padding: 3px 0;
        }
        .note-content { font-size: 0.9em; line-height: 1.5; }
        .note-content.hidden { display: none; }
        .separator { border: none; border-top: 1px solid #252535; margin: 6px 0; }
        .controls {
            background: #0d0d17; padding: 10px 16px;
            display: flex; align-items: center; gap: 8px;
            border-top: 1px solid #222;
        }
        .controls button {
            background: transparent; border: none; color: var(--btn);
            font-size: 1.2em; padding: 6px 10px; cursor: pointer;
        }
        .controls button:active { color: #fff; }
        .controls select {
            background: #1e1e2e; color: #999; border: 1px solid #333;
            border-radius: 4px; padding: 4px 8px; font-size: 0.8em;
        }
        .progress-bar {
            flex: 1; height: 4px; background: #252535;
            border-radius: 2px; position: relative;
        }
        .progress-fill {
            height: 100%; background: var(--accent);
            border-radius: 2px; width: 0%;
        }
        .loading {
            text-align: center; padding: 40px;
            color: var(--dim); font-size: 1em;
        }
    </style>
</head>
<body>

<!-- ── 课程列表页 ── -->
<div class="course-list" id="courseListPage">
    <h2>📚 课程列表</h2>
    <div id="courseListContainer">
        <div class="loading">加载中…</div>
    </div>
</div>

<!-- ── 播放器页 ── -->
<div class="player-page" id="playerPage">
    <div class="back-bar">
        <button id="btnBack">← 返回</button>
        <span id="currentCourseName"></span>
    </div>
    <div class="subtitle-list" id="subtitleList"></div>
    <div class="notes-panel" id="notesPanel">
        <div class="close-btn"><span onclick="closeNotes()">✕ 关闭</span></div>
        <div id="notesContent"></div>
    </div>
    <div class="controls">
        <button id="btnPrev">«</button>
        <button id="btnPlay">▶</button>
        <button id="btnNext">»</button>
        <select id="selSpeed">
            <option value="0.5">0.5x</option>
            <option value="0.75">0.75x</option>
            <option value="1" selected>1x</option>
            <option value="1.25">1.25x</option>
            <option value="1.5">1.5x</option>
            <option value="2">2x</option>
        </select>
        <select id="selLoop">
            <option value="none">单次</option>
            <option value="sentence">单句循环</option>
            <option value="track">单曲循环</option>
        </select>
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>
</div>

<audio id="audio" style="display:none"></audio>

<script>
// ═══════════════ 全局状态 ═══════════════
let courses = [];
let subs = [];
let enabled = {};
let currentIdx = -1;
let isPlaying = false;
let loopMode = 'none';
let basePath = '';  // GitHub Pages 基础路径

const audio = document.getElementById('audio');
const courseListContainer = document.getElementById('courseListContainer');
const courseListPage = document.getElementById('courseListPage');
const playerPage = document.getElementById('playerPage');
const currentCourseName = document.getElementById('currentCourseName');
const subtitleList = document.getElementById('subtitleList');
const notesPanel = document.getElementById('notesPanel');
const notesContent = document.getElementById('notesContent');
const btnPlay = document.getElementById('btnPlay');
const progressFill = document.getElementById('progressFill');
const selSpeed = document.getElementById('selSpeed');
const selLoop = document.getElementById('selLoop');

// ═══════════════ 解析 SRT ═══════════════
function parseSRT(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    let i = 0;
    while (i < lines.length) {
        while (i < lines.length && lines[i].trim() === '') i++;
        if (i >= lines.length) break;
        i++;
        if (i >= lines.length) break;
        const timeLine = lines[i].trim();
        i++;
        const m = timeLine.match(/(\d+):(\d+):(\d+)[.,](\d+)\s*-->\s*(\d+):(\d+):(\d+)[.,](\d+)/);
        if (!m) continue;
        const start = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]) + parseInt(m[4])/1000;
        const end   = parseInt(m[5])*3600 + parseInt(m[6])*60 + parseInt(m[7]) + parseInt(m[8])/1000;
        let text = '';
        while (i < lines.length && lines[i].trim() !== '') {
            text += (text ? ' ' : '') + lines[i].trim();
            i++;
        }
        result.push({start, end, original: text, b1: '', cn: '', ai_notes: '', remarks: ''});
    }
    return result;
}

// ═══════════════ 加载 courses.json ═══════════════
async function loadCourseList() {
    try {
        // 获取当前页面的基础路径
        const path = window.location.pathname;
        basePath = path.substring(0, path.lastIndexOf('/') + 1);
        const resp = await fetch(basePath + 'courses.json');
        courses = await resp.json();
        renderCourseList();
    } catch (err) {
        courseListContainer.innerHTML = '<div class="loading">加载 courses.json 失败，请确保文件已上传。</div>';
    }
}

function renderCourseList() {
    courseListContainer.innerHTML = '';
    courses.forEach((course, index) => {
        const card = document.createElement('div');
        card.className = 'course-card';
        card.innerHTML = `
            <div class="course-name">${course.name}</div>
            <div class="course-folder">${course.folder}</div>
        `;
        card.addEventListener('click', () => openCourse(index));
        courseListContainer.appendChild(card);
    });
}

// ═══════════════ 打开课程 ═══════════════
async function openCourse(index) {
    const course = courses[index];
    currentCourseName.textContent = course.name;

    // 切换到播放器页面
    courseListPage.style.display = 'none';
    playerPage.classList.add('active');

    // 构建文件 URL
    const folder = course.folder + '/';
    const mp3Url  = basePath + folder + course.mp3;
    const srtUrl  = basePath + folder + course.srt;
    const jsonUrl = basePath + folder + course.json;

    // 加载音频
    audio.src = mp3Url;

    // 加载 SRT
    let srtText = '';
    try {
        const resp = await fetch(srtUrl);
        srtText = await resp.text();
    } catch (e) {
        alert('SRT 文件加载失败: ' + srtUrl);
        return;
    }

    // 加载 JSON
    let jsonData = {};
    try {
        const resp = await fetch(jsonUrl);
        jsonData = await resp.json();
    } catch (e) {
        alert('JSON 文件加载失败: ' + jsonUrl);
        return;
    }

    // 合并数据
    subs = parseSRT(srtText);
    const keys = Object.keys(jsonData);
    keys.forEach((key) => {
        const idx = parseInt(key);
        if (idx >= 0 && idx < subs.length) {
            const note = jsonData[key];
            subs[idx].b1       = note.b1 || '';
            subs[idx].cn       = note.cn || '';
            subs[idx].ai_notes = note.ai_notes || note.note || '';
            subs[idx].remarks  = note.remarks || note.remark || '';
        }
    });

    // 恢复打勾状态
    const saved = localStorage.getItem('english_player_enabled');
    if (saved) { try { enabled = JSON.parse(saved); } catch(e) { enabled = {}; } }
    else { enabled = {}; }
    subs.forEach((_, i) => { if (enabled[i] === undefined) enabled[i] = true; });

    currentIdx = 0;
    renderSubtitleList();
}

// ═══════════════ 返回课程列表 ═══════════════
document.getElementById('btnBack').addEventListener('click', () => {
    audio.pause();
    isPlaying = false;
    btnPlay.textContent = '▶';
    playerPage.classList.remove('active');
    courseListPage.style.display = '';
});

// ═══════════════ 渲染字幕列表 ═══════════════
function renderSubtitleList() {
    subtitleList.innerHTML = '';
    subs.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'sub-row' + (i === currentIdx ? ' current' : '');
        const chk = document.createElement('span');
        chk.className = 'check';
        chk.textContent = enabled[i] ? '✓' : '○';
        chk.style.color = enabled[i] ? 'var(--accent)' : 'var(--dim)';
        chk.addEventListener('click', (e) => {
            e.stopPropagation();
            enabled[i] = !enabled[i];
            saveEnabled();
            renderSubtitleList();
        });
        const idxSpan = document.createElement('span');
        idxSpan.className = 'idx';
        idxSpan.textContent = i + 1;
        const textSpan = document.createElement('span');
        textSpan.className = 'text';
        textSpan.textContent = s.original;
        row.appendChild(chk); row.appendChild(idxSpan); row.appendChild(textSpan);
        row.addEventListener('click', () => { playIdx(i); });
        subtitleList.appendChild(row);
    });
    if (currentIdx >= 0) {
        const rows = subtitleList.querySelectorAll('.sub-row');
        if (rows[currentIdx]) {
            rows[currentIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
        }
    }
}

function saveEnabled() {
    localStorage.setItem('english_player_enabled', JSON.stringify(enabled));
}

function openNotes(idx) {
    const s = subs[idx];
    notesContent.innerHTML = `
        <div class="note-original">${s.original}</div>
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">B1 改写 ▾</div>
            <div class="note-content">${s.b1 || '(无)'}</div>
        </div>
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">中文翻译 ▾</div>
            <div class="note-content">${s.cn || '(无)'}</div>
        </div>
        <hr class="separator">
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">AI 解析 ▾</div>
            <div class="note-content">${s.ai_notes || '(无)'}</div>
        </div>
        <div class="note-section">
            <div class="note-label" onclick="toggleNote(this)">AI 中文 ▾</div>
            <div class="note-content">${s.remarks || '(无)'}</div>
        </div>
    `;
    notesPanel.classList.add('open');
}

function closeNotes() { notesPanel.classList.remove('open'); }
function toggleNote(label) {
    const content = label.nextElementSibling;
    content.classList.toggle('hidden');
    label.textContent = label.textContent.replace('▾', content.classList.contains('hidden') ? '▸' : '▾');
}

function playIdx(idx) {
    if (subs.length === 0) return;
    if (!audio.src) return;
    if (idx < 0 || idx >= subs.length) return;
    if (!enabled[idx]) {
        const next = findNextEnabled(idx);
        if (next >= 0) { playIdx(next); return; }
        else { audio.pause(); isPlaying = false; btnPlay.textContent = '▶'; return; }
    }
    audio.currentTime = subs[idx].start;
    audio.play();
    isPlaying = true;
    btnPlay.textContent = '⏸';
    currentIdx = idx;
    renderSubtitleList();
    openNotes(idx);
}

function findNextEnabled(from) {
    for (let i = from + 1; i < subs.length; i++) { if (enabled[i]) return i; }
    return -1;
}

btnPlay.addEventListener('click', () => {
    if (isPlaying) { audio.pause(); isPlaying = false; btnPlay.textContent = '▶'; }
    else { if (currentIdx < 0) playIdx(0); else { audio.play(); isPlaying = true; btnPlay.textContent = '⏸'; } }
});

document.getElementById('btnPrev').addEventListener('click', () => { playIdx(Math.max(0, currentIdx - 1)); });
document.getElementById('btnNext').addEventListener('click', () => { playIdx(Math.min(subs.length - 1, currentIdx + 1)); });

selSpeed.addEventListener('change', () => { audio.playbackRate = parseFloat(selSpeed.value); });
selLoop.addEventListener('change', () => { loopMode = selLoop.value; });

audio.addEventListener('timeupdate', () => {
    const t = audio.currentTime;
    if (audio.duration) { progressFill.style.width = (t / audio.duration * 100) + '%'; }
    let found = -1;
    for (let i = 0; i < subs.length; i++) { if (t >= subs[i].start && t < subs[i].end) { found = i; break; } }
    if (found >= 0 && found !== currentIdx) {
        if (!enabled[found]) { const next = findNextEnabled(found); if (next >= 0) { audio.currentTime = subs[next].start; currentIdx = next; } }
        else { currentIdx = found; }
        renderSubtitleList();
        openNotes(currentIdx);
    }
    if (loopMode === 'sentence' && currentIdx >= 0) { if (t >= subs[currentIdx].end - 0.1) { audio.currentTime = subs[currentIdx].start; } }
});

audio.addEventListener('ended', () => {
    if (loopMode === 'track') { audio.currentTime = 0; audio.play(); }
    else { isPlaying = false; btnPlay.textContent = '▶'; }
});

// ═══════════════ 启动 ═══════════════
loadCourseList();
</script>
</body>
</html>
