<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Player Lite</title>
    <style>
        :root {
            --bg: #11111b; --panel: #13131f; --text: #cdd6f4;
            --accent: #4fc3f7; --dim: #888; --disabled: #3a3a4a;
            --cur-bg: #1b3a4a; --btn: #555;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100dvh; display: flex; flex-direction: column;
            user-select: none; -webkit-user-select: none;
        }
        .course-list {
            flex: 1; overflow-y: auto; padding: 20px 16px;
        }
        .course-list h2 { font-size: 1.2em; margin-bottom: 16px; color: var(--accent); }
        .chapter-header {
            font-size: 0.85em; font-weight: bold; color: var(--accent);
            padding: 10px 4px; margin-top: 10px;
            border-bottom: 1px solid #252535;
            position: sticky; top: 0; background: var(--bg); z-index: 1;
            cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
        }
        .chapter-header:first-of-type { margin-top: 0; }
        .chapter-header .chapter-title {
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .chapter-header .chapter-count {
            font-size: 0.8em; color: var(--dim); font-weight: normal; margin-left: 8px;
        }
        .chapter-header .chapter-arrow {
            color: var(--dim); font-size: 0.9em; margin-left: 8px;
        }
        .chapter-lessons.hidden { display: none; }
        .course-card {
            background: var(--panel); border: 1px solid #252535;
            border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; margin-top: 10px; cursor: pointer;
        }
        .course-card:active { background: #1e1e30; }
        .course-card .course-name { font-size: 1em; font-weight: bold; }
        .course-card .course-folder { font-size: 0.75em; color: var(--dim); margin-top: 4px; }
        .player-page { display: none; flex-direction: column; flex: 1; height: 100dvh; }
        .player-page.active { display: flex; }
        .back-bar {
            padding: 10px 16px; background: var(--panel);
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #222; flex-shrink: 0;
        }
        .back-bar button { background: transparent; border: none; color: var(--accent); font-size: 1em; cursor: pointer; }
        .back-bar span { font-size: 0.95em; color: var(--text); }
        .subtitle-list {
            flex: 0 0 auto; overflow-y: auto; padding: 4px 0;
            max-height: 60vh;
        }
        .sub-row {
            display: flex; align-items: flex-start;
            padding: 8px 16px; cursor: pointer;
            border-bottom: 1px solid #1a1a2a;
        }
        .sub-row.current { background: var(--cur-bg); }
        .sub-row.selected { outline: 1px solid var(--accent); outline-offset: -1px; }
        .sub-row .check { font-size: 1.1em; margin-right: 10px; flex-shrink: 0; width: 22px; text-align: center; }
        .sub-row .idx { color: var(--dim); font-size: 0.7em; margin-right: 6px; flex-shrink: 0; width: 20px; text-align: right; }
        .sub-row .text { flex: 1; line-height: 1.4; font-size: 0.9em; }
        .notes-panel {
            background: var(--panel); border-top: 2px solid #252535;
            padding: 10px 16px; flex-shrink: 0;
            max-height: 65vh;
            overflow-y: auto;
        }
        .note-original {
            font-size: 1.1em; font-weight: bold;
            color: var(--accent); margin-bottom: 8px; line-height: 1.4;
        }
        .notes-row {
            display: grid; grid-template-columns: 1fr;
            gap: 6px 0px; margin-bottom: 2px;
        }
        .note-block { margin-bottom: 4px; }
        .note-label {
            color: var(--dim); font-size: 0.65em;
            text-transform: uppercase; letter-spacing: 0.5px;
            cursor: pointer; padding: 2px 0; user-select: none;
        }
        .note-content { font-size: 0.85em; line-height: 1.4; }
        .note-content.hidden { display: none; }
        .note-separator {
            border: none; border-top: 1px solid #252535; margin: 4px 0;
        }
        .controls {
            background: #0d0d17; padding: 8px 12px;
            display: flex; align-items: center; gap: 4px;
            border-top: 1px solid #222; flex-shrink: 0;
            flex-wrap: wrap;
        }
        .controls button { background: transparent; border: none; color: var(--btn); font-size: 1.1em; padding: 4px 6px; cursor: pointer; }
        .controls button:active { color: #fff; }
        .controls select {
            background: #1e1e2e; color: #999; border: 1px solid #333;
            border-radius: 4px; padding: 4px 4px; font-size: 0.75em; min-width: 46px;
        }
        .loop-label {
            font-size: 0.65em; color: var(--dim); margin-left: 4px;
        }
        .progress-bar { flex: 1; height: 4px; background: #252535; border-radius: 2px; position: relative; min-width: 50px; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; }
        .loading { text-align: center; padding: 40px; color: var(--dim); font-size: 1em; }

        /* ===== Mobile ===== */
        @media (max-width: 600px) {
            body {
                font-size: 20px;
            }
            .course-card {
                padding: 12px 14px;
            }
            .sub-row {
                padding: 10px 12px;
            }
            .sub-row .text {
                font-size: 1.2em;
            }
            .subtitle-list {
                max-height: 25vh;
                overflow-y: auto;
            }
            .notes-panel {
                max-height: 60vh;
            }
            .notes-row {
                grid-template-columns: 1fr !important;
            }
            .controls button {
                font-size: 1.6em;
                padding: 10px 14px;
                min-width: 48px;
                min-height: 48px;
            }
            .controls select {
                font-size: 0.9em;
                padding: 8px 6px;
                min-width: 50px;
                min-height: 40px;
            }
            .note-original {
                font-size: 1.2em;
            }
            .note-content {
                font-size: 1em;
            }
            .loop-label {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="course-list" id="courseListPage">
    <h2>📚 Course List</h2>
    <div id="courseListContainer"><div class="loading">Loading...</div></div>
</div>

<div class="player-page" id="playerPage">
    <div class="back-bar">
        <button id="btnBack">← Back</button>
        <span id="currentCourseName"></span>
    </div>
    <div class="subtitle-list" id="subtitleList"></div>
    <div class="notes-panel" id="notesPanel">
        <div id="notesContent"></div>
    </div>
    <div class="controls">
        <button id="btnPrev">«</button>
        <button id="btnPlay">▶</button>
        <button id="btnNext">»</button>
        <select id="selSpeed">
            <option value="0.6">0.6x</option>
            <option value="0.7">0.7x</option>
            <option value="0.8">0.8x</option>
            <option value="1">1.0x</option>
            <option value="1.1">1.1x</option>
            <option value="1.2">1.2x</option>
        </select>
        <span class="loop-label">Sentence</span>
        <select id="selSentenceLoop">
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
            <option value="5">5x</option>
            <option value="6">6x</option>
            <option value="7">7x</option>
        </select>
        <span class="loop-label">Track</span>
        <select id="selTrackLoop">
            <option value="1">1x</option>
            <option value="2">2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
            <option value="5">5x</option>
            <option value="6">6x</option>
            <option value="7">7x</option>
        </select>
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    </div>
</div>

<audio id="audio" style="display:none"></audio>

<script>
let courses = [];
let subs = [];
let enabled = {};
let currentIdx = -1;
let notesIdx = -1;
let isPlaying = false;
let sentenceLoopCount = 1;
let trackLoopCount = 1;
let sentenceLoopRemaining = 1;
let trackLoopRemaining = 1;
let basePath = '';
let collapseState = { b1: false, cn: false, ai: false, ai_cn: false };
let chapterCollapsed = {};

const audio = document.getElementById('audio');
const courseListContainer = document.getElementById('courseListContainer');
const courseListPage = document.getElementById('courseListPage');
const playerPage = document.getElementById('playerPage');
const currentCourseName = document.getElementById('currentCourseName');
const subtitleList = document.getElementById('subtitleList');
const notesContent = document.getElementById('notesContent');
const btnPlay = document.getElementById('btnPlay');
const progressFill = document.getElementById('progressFill');
const selSpeed = document.getElementById('selSpeed');
const selSentenceLoop = document.getElementById('selSentenceLoop');
const selTrackLoop = document.getElementById('selTrackLoop');

// ===== 恢复保存的设置 =====
function restoreSettings() {
    const savedSpeed = localStorage.getItem('player_speed');
    if (savedSpeed) {
        selSpeed.value = savedSpeed;
        audio.playbackRate = parseFloat(savedSpeed);
    }

    const savedSentenceLoop = localStorage.getItem('player_sentence_loop');
    if (savedSentenceLoop) {
        selSentenceLoop.value = savedSentenceLoop;
        sentenceLoopCount = parseInt(savedSentenceLoop);
        sentenceLoopRemaining = sentenceLoopCount;
    }

    const savedTrackLoop = localStorage.getItem('player_track_loop');
    if (savedTrackLoop) {
        selTrackLoop.value = savedTrackLoop;
        trackLoopCount = parseInt(savedTrackLoop);
        trackLoopRemaining = trackLoopCount;
    }
}

function parseSRT(text) {
    const lines = text.split(/\r?\n/);
    const result = [];
    let i = 0;
    while (i < lines.length) {
        while (i < lines.length && lines[i].trim() === '') i++;
        if (i >= lines.length) break;
        i++; if (i >= lines.length) break;
        const timeLine = lines[i].trim(); i++;
        const m = timeLine.match(/(\d+):(\d+):(\d+)[.,](\d+)\s*-->\s*(\d+):(\d+):(\d+)[.,](\d+)/);
        if (!m) continue;
        const start = parseInt(m[1])*3600 + parseInt(m[2])*60 + parseInt(m[3]) + parseInt(m[4])/1000;
        const end   = parseInt(m[5])*3600 + parseInt(m[6])*60 + parseInt(m[7]) + parseInt(m[8])/1000;
        let text = '';
        while (i < lines.length && lines[i].trim() !== '') { text += (text ? ' ' : '') + lines[i].trim(); i++; }
        result.push({start, end, original: text, b1: '', cn: '', ai_notes: '', remarks: ''});
    }
    return result;
}

async function loadCourseList() {
    try {
        const path = window.location.pathname;
        basePath = path.substring(0, path.lastIndexOf('/') + 1);
        const resp = await fetch(basePath + 'courses.json');
        courses = await resp.json();
        courses.forEach((chapterObj, cIdx) => {
            const key = chapterObj.chapter || ('chapter_' + cIdx);
            if (chapterCollapsed[key] === undefined) chapterCollapsed[key] = true;
        });
        renderCourseList();
    } catch (err) { courseListContainer.innerHTML = '<div class="loading">Loading...</div>'; }
}

function renderCourseList() {
    courseListContainer.innerHTML = '';
    courses.forEach((chapterObj, cIdx) => {
        const key = chapterObj.chapter || ('chapter_' + cIdx);
        const lessons = chapterObj.lessons || [];
        const isCollapsed = !!chapterCollapsed[key];

        const header = document.createElement('div');
        header.className = 'chapter-header';
        header.innerHTML = `
            <span class="chapter-title">${chapterObj.chapter || ''}</span>
            <span class="chapter-count">(${lessons.length})</span>
            <span class="chapter-arrow" style="margin-left:auto;">${isCollapsed ? '▸' : '▾'}</span>
        `;
        header.addEventListener('click', () => {
            chapterCollapsed[key] = !chapterCollapsed[key];
            renderCourseList();
        });
        courseListContainer.appendChild(header);

        const lessonsWrap = document.createElement('div');
        lessonsWrap.className = 'chapter-lessons' + (isCollapsed ? ' hidden' : '');
        lessons.forEach((lesson) => {
            const card = document.createElement('div');
            card.className = 'course-card';
            card.innerHTML = `<div class="course-name">${lesson.name}</div><div class="course-folder">${lesson.folder}</div>`;
            card.addEventListener('click', () => openCourse(lesson));
            lessonsWrap.appendChild(card);
        });
        courseListContainer.appendChild(lessonsWrap);
    });
}

// ===== 智能拼接函数 =====
function getFullUrl(folder, filename) {
    if (folder.startsWith('http')) {
        return folder + '/' + filename;
    } else {
        return basePath + folder + '/' + filename;
    }
}

// ===== 打开课程 =====
async function openCourse(course) {
    currentCourseName.textContent = course.name;
    courseListPage.style.display = 'none';
    playerPage.classList.add('active');

    // 使用智能拼接获取完整 URL
    const audioUrl = getFullUrl(course.folder, course.mp3);
    const srtUrl   = getFullUrl(course.folder, course.srt);
    const jsonUrl  = getFullUrl(course.folder, course.json);

    // 设置音频源
    audio.src = audioUrl;

    // 加载字幕
    let srtText = '';
    try { const r = await fetch(srtUrl); srtText = await r.text(); }
    catch (e) { alert('SRT loading failed'); return; }

    // 加载笔记
    let jsonData = {};
    try { const r = await fetch(jsonUrl); jsonData = await r.json(); }
    catch (e) { alert('JSON loading failed'); return; }

    // 解析字幕
    subs = parseSRT(srtText);
    const keys = Object.keys(jsonData);
    keys.forEach((key) => {
        const idx = parseInt(key);
        if (idx >= 0 && idx < subs.length) {
            const note = jsonData[key];
            subs[idx].b1 = note.b1 || ''; subs[idx].cn = note.cn || '';
            subs[idx].ai_notes = note.ai_notes || note.note || '';
            subs[idx].remarks = note.remarks || note.remark || '';
        }
    });

    // 恢复句子启用状态
    const saved = localStorage.getItem('english_player_enabled');
    if (saved) { try { enabled = JSON.parse(saved); } catch(e) { enabled = {}; } } else { enabled = {}; }
    subs.forEach((_, i) => { if (enabled[i] === undefined) enabled[i] = true; });

    // 重置循环设置
    sentenceLoopRemaining = sentenceLoopCount;
    trackLoopRemaining = trackLoopCount;
    collapseState = { b1: false, cn: false, ai: false, ai_cn: false };

    // 自动播放第一句
    playIdx(0, true);
}

document.getElementById('btnBack').addEventListener('click', () => {
    audio.pause(); isPlaying = false; btnPlay.textContent = '▶';
    playerPage.classList.remove('active'); courseListPage.style.display = '';
});

function renderSubtitleList() {
    subtitleList.innerHTML = '';
    subs.forEach((s, i) => {
        const row = document.createElement('div');
        row.className = 'sub-row' + (i === currentIdx ? ' current' : '') + (i === notesIdx ? ' selected' : '');
        const chk = document.createElement('span'); chk.className = 'check';
        chk.textContent = enabled[i] ? '✓' : '○'; chk.style.color = enabled[i] ? 'var(--accent)' : 'var(--dim)';
        chk.addEventListener('click', (e) => { e.stopPropagation(); enabled[i] = !enabled[i]; saveEnabled(); renderSubtitleList(); });
        const idxSpan = document.createElement('span'); idxSpan.className = 'idx'; idxSpan.textContent = i + 1;
        const textSpan = document.createElement('span'); textSpan.className = 'text'; textSpan.textContent = s.original;
        row.appendChild(chk); row.appendChild(idxSpan); row.appendChild(textSpan);
        row.addEventListener('click', () => { playIdx(i, true); });
        subtitleList.appendChild(row);
    });
    updateNotes();
}

function saveEnabled() { localStorage.setItem('english_player_enabled', JSON.stringify(enabled)); }

function updateNotes() {
    if (notesIdx < 0 || notesIdx >= subs.length) return;
    const s = subs[notesIdx];
    const b1Hidden = collapseState.b1 ? 'hidden' : '';
    const cnHidden = collapseState.cn ? 'hidden' : '';
    const aiHidden = collapseState.ai ? 'hidden' : '';
    const aiCnHidden = collapseState.ai_cn ? 'hidden' : '';
    notesContent.innerHTML = `
        <div class="note-original">${s.original}</div>
        <div class="notes-row">
            <div class="note-block">
                <div class="note-label" data-key="b1">B1 Rewrite ${collapseState.b1 ? '▸' : '▾'}</div>
                <div class="note-content ${b1Hidden}">${s.b1 || '(none)'}</div>
            </div>
            <div class="note-block">
                <div class="note-label" data-key="cn">Chinese ${collapseState.cn ? '▸' : '▾'}</div>
                <div class="note-content ${cnHidden}">${s.cn || '(none)'}</div>
            </div>
        </div>
        <hr class="note-separator">
        <div class="note-block">
            <div class="note-label" data-key="ai">AI Analysis ${collapseState.ai ? '▸' : '▾'}</div>
            <div class="note-content ${aiHidden}">${s.ai_notes || '(none)'}</div>
        </div>
        <hr class="note-separator">
        <div class="note-block">
            <div class="note-label" data-key="ai_cn">AI Chinese ${collapseState.ai_cn ? '▸' : '▾'}</div>
            <div class="note-content ${aiCnHidden}">${s.remarks || '(none)'}</div>
        </div>
    `;
    notesContent.querySelectorAll('.note-label').forEach(label => {
        label.addEventListener('click', () => {
            const key = label.dataset.key;
            collapseState[key] = !collapseState[key];
            updateNotes();
        });
    });
}

function playIdx(idx, manual = true) {
    if (subs.length === 0 || !audio.src) return;
    if (idx < 0 || idx >= subs.length) return;
    if (!enabled[idx]) {
        const next = findNextEnabled(idx);
        if (next >= 0) { playIdx(next, manual); return; }
        else { audio.pause(); isPlaying = false; btnPlay.textContent = '▶'; return; }
    }
    audio.currentTime = subs[idx].start;
    audio.play();
    isPlaying = true; btnPlay.textContent = '⏸';
    currentIdx = idx;
    sentenceLoopRemaining = sentenceLoopCount;
    if (manual) { notesIdx = idx; }
    renderSubtitleList();
}

function findNextEnabled(from) {
    for (let i = from + 1; i < subs.length; i++) { if (enabled[i]) return i; }
    return -1;
}

btnPlay.addEventListener('click', () => {
    if (isPlaying) { audio.pause(); isPlaying = false; btnPlay.textContent = '▶'; }
    else { if (currentIdx < 0) playIdx(0, true); else { audio.play(); isPlaying = true; btnPlay.textContent = '⏸'; } }
});
document.getElementById('btnPrev').addEventListener('click', () => { playIdx(Math.max(0, currentIdx - 1), true); });
document.getElementById('btnNext').addEventListener('click', () => { playIdx(Math.min(subs.length - 1, currentIdx + 1), true); });

selSpeed.addEventListener('change', () => {
    audio.playbackRate = parseFloat(selSpeed.value);
    localStorage.setItem('player_speed', selSpeed.value);
});
selSentenceLoop.addEventListener('change', () => {
    sentenceLoopCount = parseInt(selSentenceLoop.value);
    sentenceLoopRemaining = sentenceLoopCount;
    localStorage.setItem('player_sentence_loop', selSentenceLoop.value);
});
selTrackLoop.addEventListener('change', () => {
    trackLoopCount = parseInt(selTrackLoop.value);
    trackLoopRemaining = trackLoopCount;
    localStorage.setItem('player_track_loop', selTrackLoop.value);
});

audio.addEventListener('timeupdate', () => {
    const t = audio.currentTime;
    if (audio.duration) { progressFill.style.width = (t / audio.duration * 100) + '%'; }
    let found = -1;
    for (let i = 0; i < subs.length; i++) { if (t >= subs[i].start && t < subs[i].end) { found = i; break; } }
    if (found >= 0 && found !== currentIdx) {
        if (!enabled[found]) { const next = findNextEnabled(found); if (next >= 0) { audio.currentTime = subs[next].start; currentIdx = next; sentenceLoopRemaining = sentenceLoopCount; } }
        else { currentIdx = found; sentenceLoopRemaining = sentenceLoopCount; }
        notesIdx = currentIdx;
        renderSubtitleList();
    }
    if (currentIdx >= 0 && t >= subs[currentIdx].end - 0.1) {
        if (sentenceLoopRemaining > 1) {
            sentenceLoopRemaining--;
            audio.currentTime = subs[currentIdx].start;
        }
    }
});

audio.addEventListener('ended', () => {
    if (trackLoopRemaining > 1) {
        trackLoopRemaining--;
        audio.currentTime = 0;
        audio.play();
    } else {
        trackLoopRemaining = trackLoopCount;
        isPlaying = false; btnPlay.textContent = '▶';
    }
});

// ===== 启动 =====
restoreSettings();
loadCourseList();
</script>
</body>
</html>
